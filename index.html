<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta -->
    <title>CINEVIDEO — Watch Free Movies, Anime & TV Series Online</title>
    <meta name="description" content="CINEVIDEO is your ultimate free streaming destination. Watch trending movies, top-rated anime, Studio Ghibli classics, and the latest TV series — all in HD and 4K. No sign-up required." />
    <meta name="keywords" content="watch free movies online, free anime streaming, Studio Ghibli movies, trending movies 2024, watch movies online HD, free movie streaming site, CINEVIDEO" />
    <meta name="author" content="CINEVIDEO" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://CINEVIDEO.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://CINEVIDEO.com/" />
    <meta property="og:title" content="CINEVIDEO — Watch Free Movies, Anime & TV Series Online" />
    <meta property="og:description" content="Stream trending movies, Studio Ghibli classics, and top-rated anime for free. CINEVIDEO — your immersive cinema experience." />
    <meta property="og:image" content="https://CINEVIDEO.com/og-image.jpg" />
    <meta property="og:site_name" content="CINEVIDEO" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://CINEVIDEO.com/" />
    <meta name="twitter:title" content="CINEVIDEO — Watch Free Movies, Anime & TV Series Online" />
    <meta name="twitter:description" content="Stream trending movies, Studio Ghibli classics, and top-rated anime for free. No sign-up required." />
    <meta name="twitter:image" content="https://CINEVIDEO.com/og-image.jpg" />

    <!-- Structured Data (JSON-LD) for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CINEVIDEO",
      "url": "https://CINEVIDEO.com",
      "description": "Free online movie and anime streaming platform with thousands of titles in HD.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://CINEVIDEO.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
